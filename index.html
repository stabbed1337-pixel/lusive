<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spotify Lifetime - Documentation</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-1: #02040a;
        --bg-2: #050a0f;
        --accent: #1DB954;
        --accent-hover: #1ed760;
        --muted: #e9fff0;
        --muted-soft: rgba(233, 255, 240, 0.7);
        --radius: 16px;
        --shadow: 0 20px 60px rgba(29, 185, 84, 0.15);
        --max-width: 1300px;
        --sidebar-width: 300px;
        --transition: .35s cubic-bezier(.2, .9, .2, 1);
    }

    * { box-sizing: border-box; }

    html, body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        background: linear-gradient(180deg, var(--bg-1), var(--bg-2));
        color: var(--muted);
        height: 100%;
    }

    body {
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
    }

    a { text-decoration: none; color: inherit; }

    .wrap {
        max-width: var(--max-width);
        width: 100%;
        margin: 0 auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        flex: 1;
        position: relative;
        z-index: 1;
    }

    .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 24px;
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
    }

    .brand { display: flex; align-items: center; gap: 16px; }
    
    .brand .logo {
        width: 50px;
        height: 50px;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(29, 185, 84, 0.2);
        background: #000;
    }
    
    .brand .logo img { width: 100%; height: 100%; object-fit: cover; }
    
    .brand h1 { margin: 0; font-size: 18px; color: var(--accent); font-weight: 700; }
    .brand p { margin: 0; font-size: 13px; color: var(--muted-soft); }

    .search input {
        padding: 12px 16px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(0, 0, 0, 0.3);
        color: var(--muted);
        outline: none;
        width: 260px;
        transition: all .3s;
    }

    .search input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 15px rgba(29, 185, 84, 0.2);
    }

    .main {
        display: grid;
        grid-template-columns: var(--sidebar-width) 1fr;
        gap: 24px;
        min-height: 600px;
    }

    .sidebar {
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: var(--radius);
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 80vh;
        overflow-y: auto;
    }

    .sidebar-item {
        padding: 14px 16px;
        border-radius: 10px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: var(--transition);
        border: 1px solid transparent;
    }

    .sidebar-item:hover {
        background: rgba(255, 255, 255, 0.03);
        border-color: rgba(255, 255, 255, 0.05);
    }

    .sidebar-item.active {
        background: linear-gradient(90deg, rgba(29, 185, 84, 0.15), transparent);
        border-left: 3px solid var(--accent);
    }

    .sidebar-item .title { font-size: 14px; font-weight: 500; }
    .sidebar-item .num { font-size: 12px; color: var(--accent); font-weight: 700; opacity: 0.8; }

    .content {
        background: rgba(255, 255, 255, 0.02);
        border-radius: var(--radius);
        padding: 40px;
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        position: relative;
        overflow: hidden;
    }

    .fade-in { animation: fadeIn .4s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .content h2 {
        margin-top: 0;
        font-size: 28px;
        color: var(--accent);
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .text-block p {
        line-height: 1.7;
        font-size: 15px;
        margin-bottom: 16px;
        color: #cccccc;
    }

    .panel {
        background: rgba(29, 185, 84, 0.05);
        border: 1px solid rgba(29, 185, 84, 0.15);
        padding: 24px;
        border-radius: 12px;
        margin: 24px 0;
    }

    .panel h3 { font-size: 16px; color: white; margin-bottom: 12px; }
    .panel ul, .panel ol { padding-left: 20px; color: #b0b0b0; }
    .panel li { margin-bottom: 8px; }

    .doc-image {
        width: 100%;
        max-width: 500px; /* Resize images smaller */
        height: auto;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.1);
        margin: 20px 0;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        display: block;
    }

    .btn-group { display: flex; gap: 12px; margin-top: 30px; flex-wrap: wrap; }

    .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 24px;
        font-size: 14px;
        font-weight: 700;
        border-radius: 10px;
        cursor: pointer;
        transition: var(--transition);
        border: none;
    }

    .btn-primary {
        background: var(--accent);
        color: #000;
        box-shadow: 0 4px 15px rgba(29, 185, 84, 0.3);
    }

    .btn-primary:hover {
        background: var(--accent-hover);
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(29, 185, 84, 0.4);
    }

    .btn-secondary {
        background: rgba(255, 255, 255, 0.05);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: white;
    }

    #particles {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        z-index: 0;
    }

    @media(max-width: 900px) {
        .main { grid-template-columns: 1fr; }
        .sidebar { max-height: 250px; }
        .topbar { flex-direction: column; align-items: flex-start; gap: 16px; }
        .search input { width: 100%; }
        .wrap { padding: 10px; }
    }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="wrap">
    <div class="topbar">
        <div class="brand">
            <div class="logo">
                <img src="icon2.png" alt="Logo">
            </div>
            <div>
                <h1>Spotify Lifetime Guide</h1>
                <p>Developer Instructions & Support</p>
            </div>
        </div>
        <div class="search">
            <input id="searchInput" type="text" placeholder="Search guides...">
        </div>
    </div>

    <div class="main">
        <div class="sidebar" id="sidebar"></div>
        <div class="content" id="content"></div>
    </div>
</div>

<script>
    const guideData = [
        {
            title: "Introduction",
            heading: "Spotify Premium Activation Guide",
            content: `
                <div class="text-block">
                    <p>This guide explains how to activate your Spotify Premium key on your own account.</p>
                    <p>Activation usually takes only a few minutes. Follow the steps below to start using Spotify Premium.</p>
                </div>
            `,
            buttons: [
                { text: "Start Guide →", action: "next", type: "primary" }
            ]
        },
        {
            title: "How Activation Works",
            heading: "How Activation Works",
            content: `
                <div class="text-block">
                    <p>Your key upgrades your existing Spotify account to Premium.</p>
                </div>
                <div class="panel">
                    <h3>Important rules:</h3>
                    <ul>
                        <li>Your account must NOT already have Premium.</li>
                        <li>Use your own Spotify account.</li>
                        <li>Do not use shared accounts.</li>
                        <li>Activation normally takes 2–5 minutes.</li>
                    </ul>
                </div>
            `,
            buttons: [
                { text: "← Previous", action: "prev", type: "secondary" },
                { text: "Next →", action: "next", type: "primary" }
            ]
        },
        {
            title: "Activate Your Key",
            heading: "Activate Your Key",
            content: `
                <div class="text-block">
                    <p>Follow the steps below to redeem your key.</p>
                    <img src="https://i.ibb.co/TDfc56L8/Chat-GPT-Image-15-mar-2026-18-41-32.png" class="doc-image" alt="Activation Tutorial">
                </div>
                <div class="panel">
                    <ol>
                        <li><strong>Open the activation page</strong> (Button below).</li>
                        <li><strong>Log in</strong> to your Spotify account.</li>
                        <li><strong>Enter your activation key.</strong></li>
                        <li><strong>Confirm activation.</strong></li>
                        <li><strong>Restart</strong> the Spotify app.</li>
                    </ol>
                </div>
            `,
            buttons: [
                { text: "Open Activation Page", url: "https://www.upgradespotify.com/upgrade", type: "primary" },
                { text: "Next Step →", action: "next", type: "secondary" }
            ]
        },
        {
            title: "Check Status",
            heading: "Check If Premium Is Active",
            content: `
                <div class="panel">
                    <h3>Verification Steps:</h3>
                    <ol>
                        <li>Open Spotify</li>
                        <li>Click your profile</li>
                        <li>Go to Account Settings</li>
                        <li>Look for "Spotify Premium"</li>
                    </ol>
                </div>
                <div class="text-block">
                    <p>If it shows Premium: Everything is working correctly.</p>
                </div>
            `,
            buttons: [
                { text: "Open Spotify Account", url: "https://www.spotify.com/account", type: "primary" },
                { text: "Next →", action: "next", type: "secondary" }
            ]
        },
        {
            title: "Premium Disappeared",
            heading: "Premium Disappeared Fix",
            content: `
                <div class="text-block">
                    <p>Sometimes Spotify may remove Premium after some time. This can happen because Spotify updated their system or the temporary activation expired.</p>
                </div>
                <div class="panel">
                    <h3>Solution:</h3>
                    <ul>
                        <li>Activate a new key.</li>
                        <li>Use the same Spotify account.</li>
                        <li>Repeat the activation steps.</li>
                    </ul>
                </div>
            `,
            buttons: [
                { text: "Go to Activation Guide", jump: 2, type: "primary" },
                { text: "Next Issue →", action: "next", type: "secondary" }
            ]
        },
        {
            title: "Key Not Working",
            heading: "Key Not Working Fix",
            content: `
                <div class="panel">
                    <h3>Common Reasons & Fixes</h3>
                    
                    <img src="https://i.ibb.co/KzNFRBK9/info.png" class="doc-image" alt="Key Info">
                    
                    <p><strong>1. Account already had Premium</strong></p>
                    <p>Make sure your Spotify account does NOT already have Premium.</p>
                    <br>
                    <p><strong>2. Key typed incorrectly</strong></p>
                    <p>Copy the key exactly from your email.</p>
                    <br>
                    <p><strong>3. Browser Cache</strong></p>
                    <p>Try again after restarting your browser.</p>
                </div>
            `,
            buttons: [
                { text: "Key Info Checker", url: "https://www.upgradespotify.com/key-info", type: "primary" }, 
                { text: "Contact Support", url: "https://discord.gg/lusive2", type: "secondary" },
                { text: "Next →", action: "next", type: "secondary" }
            ]
        },
        {
            title: "Renewal / Expired",
            heading: "Key Expired / Renewal",
            content: `
                <div class="text-block">
                    <p>Some keys may expire after a long time. If your Premium disappears, you can activate a new key again.</p>
                    
                    <img src="https://i.ibb.co/7NVw6z8z/renew.png" class="doc-image" alt="Renew Key">
                    
                    <p>Your Spotify account stays the same, and you won't lose playlists.</p>
                </div>
                <div class="panel">
                    <h3>Renewal Steps:</h3>
                    <ol>
                        <li>Open the renewal page.</li>
                        <li>Enter your new key.</li>
                        <li>Confirm activation.</li>
                    </ol>
                </div>
            `,
            buttons: [
                { text: "Renew Key Now", url: "https://www.upgradespotify.com/renew", type: "primary" }
            ]
        },
        {
            title: "Support",
            heading: "Need Help?",
            content: `
                <div class="text-block">
                    <p>If you have any issues that were not solved by this guide, please contact our support team.</p>
                </div>
            `,
            buttons: [
                { text: "Join Discord Support", url: "https://discord.gg/lusive2", type: "primary" }
            ]
        }
    ];

    const sidebar = document.getElementById('sidebar');
    const content = document.getElementById('content');
    const searchInput = document.getElementById('searchInput');
    let currentIndex = 0;

    function renderSidebar() {
        sidebar.innerHTML = '';
        guideData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = `sidebar-item ${index === currentIndex ? 'active' : ''}`;
            div.innerHTML = `<span class="title">${item.title}</span><span class="num">0${index + 1}</span>`;
            div.onclick = () => loadContent(index);
            sidebar.appendChild(div);
        });
    }

    function loadContent(index) {
        currentIndex = index;
        const data = guideData[index];
        
        content.classList.remove('fade-in');
        void content.offsetWidth; 
        
        let btns = '';
        data.buttons.forEach(b => {
            let attr = '';
            if(b.url) attr = `onclick="window.open('${b.url}', '_blank')"`;
            else if(b.action === 'next') attr = `onclick="loadContent(${Math.min(currentIndex+1, guideData.length-1)})"`;
            else if(b.action === 'prev') attr = `onclick="loadContent(${Math.max(currentIndex-1, 0)})"`;
            else if(b.jump !== undefined) attr = `onclick="loadContent(${b.jump})"`;
            
            btns += `<button class="btn btn-${b.type}" ${attr}>${b.text}</button>`;
        });

        content.innerHTML = `
            <h2>${data.heading}</h2>
            ${data.content}
            <div class="btn-group">${btns}</div>
        `;
        
        content.classList.add('fade-in');
        renderSidebar();
    }

    searchInput.addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        document.querySelectorAll('.sidebar-item').forEach((el, idx) => {
            const txt = guideData[idx].title.toLowerCase() + " " + guideData[idx].heading.toLowerCase();
            el.style.display = txt.includes(val) ? 'flex' : 'none';
        });
    });

    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");
    let particles = [];
    
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 0.5;
            this.speed = Math.random() * 0.5 + 0.2;
            this.op = Math.random() * 0.5 + 0.1;
        }
        update() {
            this.y -= this.speed;
            if(this.y < 0) this.reset();
        }
        draw() {
            ctx.fillStyle = `rgba(29, 185, 84, ${this.op})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
            ctx.fill();
        }
    }

    function init() { for(let i=0; i<60; i++) particles.push(new Particle()); }
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    
    init();
    animate();
    loadContent(0);
</script>
</body>
</html>
